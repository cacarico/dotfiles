k9s:
  body:
    bgColor: default
  refreshRate: 2
  maxConnRetry: 5
  enableMouse: false
  headless: false
  logoless: false
  crumbsless: false
  readOnly: false
  noIcons: false
  logger:
    tail: 100
    buffer: 5000
    sinceSeconds: 60
    fullScreenLogs: false
    textWrap: false
    showTime: false
  currentContext: arn:aws:eks:eu-central-1:056343990969:cluster/moria
  currentCluster: arn:aws:eks:eu-central-1:056343990969:cluster/moria
  clusters:
    arn:aws:eks:eu-central-1:056343990969:cluster/moria:
      namespace:
        active: all
        favorites:
        - all
        - default
      view:
        active: pods
      featureGates:
        nodeShell: false
      shellPod:
        image: busybox:1.31
        command: []
        args: []
        namespace: default
        limits:
          cpu: 100m
          memory: 100Mi
      portForwardAddress: localhost
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
  screenDumpDir: /var/folders/gm/vlndsz5j2nx40tkmgktc6kzjylffnq/T/k9s-screens-caio.teixeira
